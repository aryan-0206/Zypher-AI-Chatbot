services:
  # ── Single Web Service: Backend serves built React frontend ──
  - type: web
    name: zypher-ai
    env: python
    region: oregon
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build && cd ..
      cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: GEMINI_API_KEY
        sync: false          # ← Set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: NODE_VERSION
        value: 18.17.0
